<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TURBO — OL Maths</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --card: rgba(255,255,255,0.97);
      --primary: #1e3a5f; --primary-light: #eff6ff;
      --blue: #1d4ed8; --gold: #d97706;
      --ink: #1e293b; --muted: #64748b; --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
    .container { width: 100%; max-width: 640px; margin: 20px; background: var(--card); border-radius: 22px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.45); color: var(--ink); }
    .game-title { font-family: 'DM Serif Display', serif; font-size: 3rem; color: var(--primary); margin-bottom: 2px; font-style: italic; letter-spacing: -1px; }
    .game-sub { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
    .progress-wrap { margin-bottom: 16px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
    .progress-track { background: #eee; border-radius: 50px; height: 9px; }
    .progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--blue), var(--gold)); transition: width 0.4s; }
    .star-banner { background: var(--primary-light); border: 2px solid var(--blue); border-radius: 10px; padding: 9px 14px; font-size: 0.88rem; color: var(--blue); font-weight: 700; margin-bottom: 18px; }
    #cat-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; justify-content: center; }
    .cat-btn { background: #f1f5f9; color: var(--muted); font-size: 0.8rem; padding: 7px 13px; border: none; border-radius: 20px; cursor: pointer; font-weight: 700; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
    .cat-btn:hover { background: #dde6f0; }
    .cat-btn.active { background: var(--blue); color: white; }
    #level-list { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 6px; }
    .zone-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin: 6px 0 2px; align-self: flex-start; padding-left: 4px; }
    .level-btn { font-size: 0.98rem; padding: 13px 16px; background: var(--blue); color: white; border-radius: 10px; border: none; cursor: pointer; width: 96%; max-width: 380px; transition: transform 0.2s, filter 0.2s; display: flex; justify-content: space-between; align-items: center; font-family: 'Nunito', sans-serif; font-weight: 700; }
    .level-btn:hover { filter: brightness(1.08); transform: scale(1.02); }
    .level-btn:disabled { background: #c8c4bc; cursor: not-allowed; transform: none; color: #888; }
    .level-btn.adv { background: #7c3d9e; }
    .level-badge { font-size: 0.7rem; background: rgba(255,255,255,0.22); padding: 2px 8px; border-radius: 10px; }
    .uncle-btn { background: linear-gradient(135deg, var(--primary), #0f2240) !important; justify-content: center !important; font-size: 1rem !important; }
    #game { display: none; margin-top: 16px; }
    .sym-toolbar { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0 4px; }
    .sym-btn { background: var(--primary-light); border: 1.5px solid var(--blue); color: var(--blue); font-size: 1rem; font-weight: 700; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-family: "Nunito", sans-serif; line-height: 1; transition: background 0.15s; user-select: none; -webkit-user-select: none; }
    .sym-btn:active { background: var(--blue); color: white; }
    #timer { display: none; }
    #questions div { margin: 14px 0; font-size: 0.97rem; text-align: left; }
    #questions input { font-size: 0.97rem; padding: 9px 11px; width: 100%; margin-top: 5px; border: 2px solid var(--border); border-radius: 8px; font-family: 'Nunito', sans-serif; box-sizing: border-box; }
    #questions input:focus { outline: none; border-color: var(--blue); }
    #submit { font-size: 1.2rem; padding: 13px 26px; background: var(--blue); color: white; border-radius: 12px; cursor: pointer; margin: 14px 4px 4px; border: none; font-family: 'Nunito', sans-serif; font-weight: 900; transition: transform 0.2s, filter 0.2s; }
    #submit:hover { filter: brightness(1.1); transform: scale(1.03); }
    #results { margin-top: 16px; font-size: 0.97rem; text-align: left; }
    .try-again, #back-button { font-size: 1rem; padding: 11px 20px; background: var(--blue); color: white; border-radius: 10px; cursor: pointer; margin: 7px 4px; border: none; font-family: 'Nunito', sans-serif; font-weight: 900; transition: transform 0.2s; }
    #back-button { background: #555; }
    .try-again:hover, #back-button:hover { transform: scale(1.03); }
    .perfect-celebration { font-size: 1.8rem; color: var(--gold); margin-bottom: 10px; text-align: center; }
    .unlock-msg { color: var(--blue); font-weight: 700; font-size: 0.97rem; margin: 8px 0; }
    footer { margin-top: 28px; font-size: 0.7rem; color: #aaa; border-top: 1px solid #eee; padding-top: 12px; text-align: center; }
    @media (max-width: 480px) {
      .container { margin: 10px; padding: 20px 16px; border-radius: 16px; }
      .game-title { font-size: 2.4rem; }
      .cat-btn { font-size: 0.75rem; padding: 6px 11px; }
      .level-btn { font-size: 0.92rem; padding: 13px 14px; width: 100%; }
      #questions div { font-size: 0.92rem; margin: 12px 0; }
      #questions input { font-size: 1rem; padding: 10px 11px; }
      #submit { font-size: 1.1rem; padding: 14px 22px; width: 100%; margin: 14px 0 4px; }
      .try-again, #back-button { font-size: 0.95rem; padding: 12px 18px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="game-title">TURBO</div>
  <p class="game-sub">LC Maths OL · The Uncle</p>

  <div class="progress-wrap">
    <div class="progress-label"><span>Stars to unlock The Uncle</span><span id="progress-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="star-banner" id="star-banner">⭐ 0 stars — do 5 to unlock The Uncle</div>

  <div id="cat-buttons">
    <button class="cat-btn active" type="button" onclick="selectCat('algebra',this)">𝑥 Algebra</button>
    <button class="cat-btn" type="button" onclick="selectCat('geometry',this)">📐 Geometry</button>
    <button class="cat-btn" type="button" onclick="selectCat('statistics',this)">📊 Statistics</button>
    <button class="cat-btn" type="button" onclick="selectCat('functions',this)">📈 Functions</button>
    <button class="cat-btn" type="button" onclick="selectCat('financial',this)">💶 Financial</button>
    <button class="cat-btn" type="button" onclick="selectCat('coordinate',this)">📍 Coord Geo</button>
    <button class="cat-btn" type="button" onclick="selectCat('number',this)">🔢 Number</button>
  </div>

  <div id="level-list"></div>

  <div id="game">
    <div id="timer">Time: 0s</div>
    <div id="questions"></div>
    <div class="sym-toolbar" id="sym-toolbar">
    <button class="sym-btn" type="button" onclick="insertSym('π')">π</button>
    <button class="sym-btn" type="button" onclick="insertSym('²')">x²</button>
    <button class="sym-btn" type="button" onclick="insertSym('³')">x³</button>
    <button class="sym-btn" type="button" onclick="insertSym('√')">√</button>
    <button class="sym-btn" type="button" onclick="insertSym('±')">±</button>
    <button class="sym-btn" type="button" onclick="insertSym('×')">×</button>
    <button class="sym-btn" type="button" onclick="insertSym('÷')">÷</button>
    <button class="sym-btn" type="button" onclick="insertSym('≤')">≤</button>
    <button class="sym-btn" type="button" onclick="insertSym('≥')">≥</button>
    <button class="sym-btn" type="button" onclick="insertSym('≠')">≠</button>
    <button class="sym-btn" type="button" onclick="insertSym('∞')">∞</button>
    <button class="sym-btn" type="button" onclick="insertSym('°')">°</button>
    <button class="sym-btn" type="button" onclick="insertSym('½')">½</button>
    <button class="sym-btn" type="button" onclick="insertSym('¼')">¼</button>
    <button class="sym-btn" type="button" onclick="insertSym('¾')">¾</button>
  </div>
  <button id="submit" type="button">Check Answers</button>
    <div id="results"></div>
  </div>

  <footer>© 2026 · LC Maths OL · The Uncle · Imagination and Perseverance</footer>
</div>

<script>
// ============================================================

// ============================================================

// ============================================================
algebra: [
  // Level 1 — Basic definitions and simple facts
  {prompt:"What does 'solve for x' mean?",answer:"find the value of x that makes the equation true",lv:1},

  {prompt:"Expand: 2(x + 3)",answer:"2x + 6",lv:1},

  {prompt:"Solve: x + 5 = 12",answer:"x = 7",lv:1},
  {prompt:"Solve: x − 3 = 8",answer:"x = 11",lv:1},
  {prompt:"Solve: 2x = 10",answer:"x = 5",lv:1},
  {prompt:"Solve: x/3 = 4",answer:"x = 12",lv:1},

  // Level 2 — Slightly harder equations and basic factorising
  {prompt:"Solve: 3x + 1 = 10",answer:"x = 3",lv:2},
  {prompt:"Solve: 2x − 5 = 9",answer:"x = 7",lv:2},
  {prompt:"Solve: 4x + 3 = 19",answer:"x = 4",lv:2},
  {prompt:"Solve: 5x − 2 = 13",answer:"x = 3",lv:2},

  {prompt:"Expand: (x + 1)(x − 4)",answer:"x² − 3x − 4",lv:2},
  {prompt:"Expand: (x − 2)(x − 5)",answer:"x² − 7x + 10",lv:2},
  {prompt:"Factorise: x² + 5x + 6",answer:"(x + 2)(x + 3)",lv:2},
  {prompt:"Factorise: x² + 7x + 12",answer:"(x + 3)(x + 4)",lv:2},

  {prompt:"Factorise: 2x + 6",answer:"2(x + 3)",lv:2},

  {prompt:"Factorise: 3x² + 6x",answer:"3x(x + 2)",lv:2},
  {prompt:"What is the difference of two squares rule?",answer:"a² − b² = (a + b)(a − b)",lv:2},
  {prompt:"Factorise: x² − 9",answer:"(x + 3)(x − 3)",lv:2},
  {prompt:"Factorise: x² − 16",answer:"(x + 4)(x − 4)",lv:2},

  // Level 3 — Simultaneous equations, inequalities
  {prompt:"Solve simultaneously: x + y = 5, x − y = 1",answer:"x = 3, y = 2",lv:3},
  {prompt:"Solve simultaneously: 2x + y = 7, x + y = 4",answer:"x = 3, y = 1",lv:3},

  {prompt:"Solve: 2x + 3 > 9",answer:"x > 3",lv:3},
  {prompt:"Solve: 3x − 1 ≤ 11",answer:"x ≤ 4",lv:3},
  {prompt:"Solve: 4x + 2 < 18",answer:"x < 4",lv:3},
  {prompt:"When you multiply or divide an inequality by a negative number you must",answer:"flip the inequality sign",lv:3},
  {prompt:"Solve: −2x > 6",answer:"x < −3",lv:3},
  {prompt:"The quadratic formula",answer:"x = (−b ± √(b²−4ac)) / 2a",lv:3},
  {prompt:"In ax² + bx + c = 0, what is the discriminant?",answer:"b² − 4ac",lv:3},

  {prompt:"Solve: x² − 5x + 6 = 0 by factorising",answer:"x = 2 or x = 3",lv:3},
  {prompt:"Solve: x² + x − 12 = 0",answer:"x = 3 or x = −4",lv:3},

  // Level 4 — Harder applications
  {prompt:"Solve simultaneously: 2x + 3y = 12, x − y = 1",answer:"x = 3, y = 2",lv:4},
  {prompt:"Rearrange v = u + at for a",answer:"a = (v − u) / t",lv:4},
  {prompt:"Rearrange A = πr² for r",answer:"r = √(A/π)",lv:4},
  {prompt:"Rearrange F = ma for m",answer:"m = F/a",lv:4},
  {prompt:"Solve: x² − 7x + 10 = 0",answer:"x = 2 or x = 5",lv:4},
  {prompt:"Solve: x² + 3x − 10 = 0",answer:"x = 2 or x = −5",lv:4},

  {prompt:"What does it mean to verify a solution?",answer:"substitute the answer back into the original equation to check it works",lv:4},
  {prompt:"Simplify: (3x²)(2x³)",answer:"6x⁵",lv:4},
  {prompt:"Simplify: 12x⁴ ÷ 4x²",answer:"3x²",lv:4},
  {prompt:"What is x⁰ equal to (x ≠ 0)?",answer:"1",lv:4},
  {prompt:"What is x^(−1)?",answer:"1/x",lv:4},

  // Level 5 — Complex problems
  {prompt:"Factorise: 2x² + 5x + 3",answer:"(2x + 3)(x + 1)",lv:5},
  {prompt:"Factorise: 3x² + 7x + 2",answer:"(3x + 1)(x + 2)",lv:5},
  {prompt:"Solve: 2x² − 5x + 2 = 0",answer:"x = 2 or x = 1/2",lv:5},

  {prompt:"Simplify: (x² − 4) / (x + 2)",answer:"x − 2",lv:5},

  {prompt:"What is the product of roots of ax² + bx + c = 0?",answer:"c/a",lv:5},

  // Level 6 — Exam standard
  {prompt:"Steps to solve a simultaneous equation by substitution",answer:"rearrange one equation for x, substitute into other, solve for y, find x",lv:6},
  {prompt:"Steps to solve by elimination",answer:"make one variable the same coefficient, add or subtract equations, solve, substitute back",lv:6},
  {prompt:"How to form a quadratic from a word problem",answer:"define variable, write equation using the information, expand and rearrange to = 0, solve",lv:6},
  {prompt:"When to use quadratic formula vs factorising",answer:"factorise when easy; use formula when discriminant is messy or question specifies",lv:6},

  // Level 7 — Multi-step
  {prompt:"Solve: (x + 1)(x − 2) = 4",answer:"expand to x² − x − 2 = 4, rearrange to x² − x − 6 = 0, solve: x = 3 or x = −2",lv:7},
  {prompt:"A rectangle has area 24 and perimeter 20. Find the dimensions.",answer:"length and width satisfy: 2(l+w)=20 so l+w=10; lw=24 — solve: l=4 w=6 or l=6 w=4",lv:7},

  // Level 8 — Exam-style full questions
  {prompt:"Solve x² − 3x − 10 = 0 and verify both solutions",answer:"(x−5)(x+2)=0, x=5 or x=−2; verify: 25−15−10=0 ✓, 4+6−10=0 ✓",lv:8},
  {prompt:"Show that x = 3 is a solution of 2x² − 5x − 3 = 0, then find the other root",answer:"2(9)−15−3=0 ✓; product of roots = −3/2, so other root = −1/2",lv:8},
],

// ============================================================
// GEOMETRY & TRIGONOMETRY

  // Level 1

  {prompt:"Area of a rectangle",answer:"length × width",lv:1},

  {prompt:"sin 30° =",answer:"0.5 or 1/2",lv:2},
  {prompt:"cos 60° =",answer:"0.5 or 1/2",lv:2},
  {prompt:"sin 90° =",answer:"1",lv:2},
  {prompt:"cos 0° =",answer:"1",lv:2},
  {prompt:"tan 45° =",answer:"1",lv:2},
  {prompt:"sin 45° =",answer:"1/√2 or √2/2 ≈ 0.707",lv:2},
  {prompt:"Area of triangle using trig: formula",answer:"½ab sin C",lv:2},

  // Level 3

  {prompt:"A ladder 5m long leans against a wall. It makes 60° with the ground. How high up the wall?",answer:"5 × sin 60° = 5 × 0.866 = 4.33m",lv:3},
  {prompt:"What is a tangent to a circle?",answer:"a line that touches the circle at exactly one point",lv:3},

  // Level 4
  {prompt:"Find angle A if sin A = 0.5",answer:"A = 30°",lv:4},

// ============================================================
// GAME ENGINE
// ============================================================
const UNCLE_UNLOCK = 5;
const PENALTY_SECS = 20;
const QUESTIONS_PER_ROUND = 10;

var currentCat = 'algebra';
var currentLevel = 1;
var currentItems = [];
var startTime, timerInterval;

const levelList = document.getElementById('level-list');
const gameContainer = document.getElementById('game');
const questionsContainer = document.getElementById('questions');
const resultsContainer = document.getElementById('results');

function storageKey(s) { return 'lcm_turbo_' + s; }
function getUnlocked() { return parseInt(localStorage.getItem(storageKey('unlocked')) || '1'); }
function setUnlocked(l) { if (l > getUnlocked()) localStorage.setItem(storageKey('unlocked'), l); }
function getBest(c, l) { return localStorage.getItem(storageKey('best_' + c + '_' + l)); }
function setBest(c, l, s) { var p = parseInt(getBest(c, l) || '0'); if (s > p) localStorage.setItem(storageKey('best_' + c + '_' + l), s); }

function getTotalStars() {
  var t = 0;
  ['algebra','geometry','statistics','functions','financial','coordinate','number'].forEach(function(c) {
    for (var v = 1; v <= 8; v++) t += parseInt(getBest(c, v) || '0');
  });
  return t;
}

function uncleUnlocked() { return getTotalStars() >= UNCLE_UNLOCK; }

function getTurboData() {
  var cats = ['algebra','geometry','statistics','functions','financial','coordinate','number'];
  var labels = { algebra:'Algebra', geometry:'Geometry & Trig', statistics:'Statistics', functions:'Functions', financial:'Financial Maths', coordinate:'Coordinate Geometry', number:'Number & Sets' };
  var data = {};
  cats.forEach(function(c) {
    data[c] = { label: labels[c], levels: {} };
    for (var l = 1; l <= 8; l++) { var s = getBest(c, l); if (s) data[c].levels[l] = parseInt(s); }
  });
  return data;
}

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderLevels();
}

function renderLevels() {
  levelList.style.display = 'flex';
  gameContainer.style.display = 'none';
  levelList.innerHTML = '';
  updateProgress();

  var unlocked = getUnlocked();
  var zones = { 1:'Levels 1–3 · Core Knowledge', 4:'Levels 4–5 · Application', 6:'Levels 6–8 · Exam Standard' };

  for (var i = 1; i <= 8; i++) {
    if (zones[i]) {
      var zl = document.createElement('div');
      zl.className = 'zone-label';
      zl.textContent = zones[i];
      levelList.appendChild(zl);
    }
    var pool = getPool(currentCat, i);
    if (!pool.length) continue;

    var btn = document.createElement('button');
    var best = getBest(currentCat, i);
    var locked = i > unlocked;
    var stars = best ? '⭐'.repeat(parseInt(best)) + '☆'.repeat(3 - parseInt(best)) : '';
    var isAdv = i >= 6;

    btn.className = 'level-btn' + (isAdv ? ' adv' : '');
    btn.type = 'button';
    btn.innerHTML = '<span>' + (locked ? '🔒 ' : '') + 'Level ' + i + ' <span style="font-size:0.72rem;opacity:0.6">(' + pool.length + ' items)</span></span>' +
      '<span class="level-badge">' + (stars || '—') + '</span>';
    btn.disabled = locked;
    (function(lv) { btn.addEventListener('click', function() { startGame(lv); }); })(i);
    levelList.appendChild(btn);
  }

  if (uncleUnlocked()) {
    var eb = document.createElement('button');
    eb.type = 'button';
    eb.textContent = '📐 Meet The Uncle →';
    eb.className = 'level-btn uncle-btn';
    eb.addEventListener('click', function() {
      localStorage.setItem('lcm_turbo_data', JSON.stringify(getTurboData()));
      window.location.href = 'lc-maths-uncle.html';
    });
    levelList.appendChild(eb);
  }
}

function getPool(cat, level) {
  return (TERMS[cat] || []).filter(function(p) { return p.lv === level; });
}

function getPlayPool(cat, level) {
  var exact = (TERMS[cat] || []).filter(function(p) { return p.lv === level; });
  var adjacent = (TERMS[cat] || []).filter(function(p) { return Math.abs(p.lv - level) === 1; });
  return shuffleArray(exact.slice()).concat(shuffleArray(adjacent.slice()));
}

function startGame(level) {
  currentLevel = level;
  var pool = getPlayPool(currentCat, level);
  currentItems = shuffleArray(pool.slice()).slice(0, QUESTIONS_PER_ROUND);

  levelList.style.display = 'none';
  gameContainer.style.display = 'block';
  questionsContainer.innerHTML = '';
  resultsContainer.innerHTML = '';

  currentItems.forEach(function(item) {
    var div = document.createElement('div');
    div.innerHTML = '<div><strong>' + escHtml(item.prompt) + '</strong></div>' +
      '<input type="text" data-answer="' + escHtml(item.answer) + '" placeholder="Your answer..." autocomplete="off" autocorrect="off" spellcheck="false">';
    var inp = div.querySelector('input');
    inp.addEventListener('paste', function(e) { e.preventDefault(); });
    inp.addEventListener('focus', function() { window._lastInput = inp; });
    questionsContainer.appendChild(div);
  });

  startTime = Date.now();
  timerInterval = setInterval(function() {
    document.getElementById('timer').textContent = 'Time: ' + Math.floor((Date.now() - startTime) / 1000) + 's';
  }, 1000);

  var first = questionsContainer.querySelector('input');
  if (first) first.focus();
}

document.getElementById('submit').addEventListener('click', function() {
  clearInterval(timerInterval);
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var penalty = 0;
  var total = currentItems.length;
  var lenientCorrect = 0;
  var strictCorrect = 0;

  var results = [];
  document.querySelectorAll('#questions input').forEach(function(input) {
    var userAns = input.value.trim();
    var correctAns = input.dataset.answer;
    var strict = normalise(userAns) === normalise(correctAns);
    var lenient = strict;
    if (!lenient) {
      var uWords = normalise(userAns).split(' ').filter(function(w) { return w.length > 1; });
      var cWords = normalise(correctAns).split(' ').filter(function(w) { return w.length > 1; });
      if (uWords.length && cWords.length) {
        var matches = uWords.filter(function(w) { return cWords.indexOf(w) !== -1; }).length;
        lenient = matches >= Math.ceil(Math.min(uWords.length, cWords.length) * 0.6);
      }
    }
    results.push({ userAns:userAns, correctAns:correctAns, strict:strict, lenient:lenient, prompt:input.closest('div').querySelector('strong').textContent });
    if (lenient) lenientCorrect++;
    if (strict) strictCorrect++;
  });

  document.querySelectorAll('#questions input').forEach(function(input, idx) {
    if (results[idx].lenient) { input.style.border='2px solid #16a34a'; input.style.background='#f0fdf4'; }
    else { penalty += PENALTY_SECS; input.style.border='2px solid #dc2626'; input.style.background='#fef2f2'; }
  });

  var stars = 0;
  if (strictCorrect === total) stars = 3;
  else if (lenientCorrect === total) stars = 2;
  else if (lenientCorrect >= Math.ceil(total * 0.5)) stars = 1;

  setBest(currentCat, currentLevel, stars);
  if (stars >= 1) setUnlocked(currentLevel + 1);

  resultsContainer.innerHTML = '';

  if (lenientCorrect === total) {
    var cel = document.createElement('div');
    cel.className = 'perfect-celebration';
    cel.textContent = stars === 3 ? '🎉 PERFECT — 3 stars!' : '✅ All correct!';
    resultsContainer.appendChild(cel);
  }

  var sum = document.createElement('div');
  sum.innerHTML = '<h3>Done!</h3><p>Correct: ' + lenientCorrect + '/' + total + '</p>' +
    '<p style="font-size:1.4rem">' + '⭐'.repeat(stars) + '☆'.repeat(3-stars) + '</p>';
  resultsContainer.appendChild(sum);

  var missed = results.filter(function(r) { return !r.lenient; });
  if (missed.length) {
    var mt = document.createElement('h4');
    mt.textContent = 'What you missed:';
    mt.style.marginTop = '10px';
    resultsContainer.appendChild(mt);
    missed.forEach(function(r) {
      var p = document.createElement('p');
      p.style.cssText = 'margin:6px 0;font-size:0.9rem;';
      p.innerHTML = '<strong>' + escHtml(r.prompt) + '</strong><br>✅ <span style="color:#16a34a">' + escHtml(r.correctAns) + '</span><br>❌ <span style="color:#dc2626">' + escHtml(r.userAns || '(blank)') + '</span>';
      resultsContainer.appendChild(p);
    });
  }

  if (stars >= 1) {
    var um = document.createElement('p');
    um.className = 'unlock-msg';
    um.textContent = '🔓 Level ' + (currentLevel + 1) + ' unlocked!';
    resultsContainer.appendChild(um);
  }

  updateProgress();

  if (uncleUnlocked()) {
    var bm = document.createElement('p');
    bm.className = 'unlock-msg';
    bm.innerHTML = '📐 The Uncle is ready! <a href="lc-maths-uncle.html" style="color:#1d4ed8;font-weight:bold;" onclick="saveTurboData()">Meet The Uncle →</a>';
    resultsContainer.appendChild(bm);
  }

  var tb = document.createElement('button');
  tb.textContent = 'Try Again'; tb.className = 'try-again'; tb.type = 'button';
  tb.onclick = function() { startGame(currentLevel); };
  resultsContainer.appendChild(tb);

  var bb = document.createElement('button');
  bb.textContent = '← Back'; bb.id = 'back-button'; bb.type = 'button';
  bb.onclick = function() { renderLevels(); };
  resultsContainer.appendChild(bb);
});

function saveTurboData() { localStorage.setItem('lcm_turbo_data', JSON.stringify(getTurboData())); }

function updateProgress() {
  var stars = getTotalStars();
  var pct = Math.min(100, Math.round((stars / UNCLE_UNLOCK) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  var banner = document.getElementById('star-banner');
  if (uncleUnlocked()) {
    banner.textContent = '🎉 ' + stars + ' stars — The Uncle is unlocked!';
    banner.style.background = '#eff6ff'; banner.style.borderColor = '#1d4ed8'; banner.style.color = '#1d4ed8';
  } else {
    banner.textContent = '⭐ ' + stars + ' star' + (stars !== 1 ? 's' : '') + ' — need ' + UNCLE_UNLOCK + ' to unlock The Uncle';
  }
}

function insertSym(sym) {
  var target = (document.activeElement && document.activeElement.tagName === 'INPUT')
    ? document.activeElement
    : (window._lastInput || null);
  if (!target) {
    var inputs = document.querySelectorAll('#questions input');
    if (inputs.length) target = inputs[inputs.length - 1];
  }
  if (!target) return;
  var start = target.selectionStart || target.value.length;
  var end = target.selectionEnd || target.value.length;
  var val = target.value;
  target.value = val.slice(0, start) + sym + val.slice(end);
  target.selectionStart = target.selectionEnd = start + sym.length;
  target.focus();
}

function normaliseMath(s) {
  return String(s)
    .toLowerCase()
    .replace(/\bpi\b/g, 'π')
    .replace(/\bsqrt\b/g, '√')
    .replace(/\^2\b/g, '²')
    .replace(/\^3\b/g, '³')
    .replace(/\^\(1\/2\)/g, '½')
    .replace(/x2\b/g, 'x²')
    .replace(/x3\b/g, 'x³')
    .replace(/<=|=</g, '≤')
    .replace(/>=|=>/g, '≥')
    .replace(/!=|=/g, '≠')
    .replace(/\binfinity\b|\binf\b/g, '∞')
    .replace(/\bdeg\b/g, '°')
    .replace(/1\/2/g, '½')
    .replace(/1\/4/g, '¼')
    .replace(/3\/4/g, '¾')
    .replace(/x/g, '×')
    .replace(/[\u2018\u2019']/g, '')
    .replace(/[,;:.!?]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function normalise(s) {
  return normaliseMath(s);
}
function shuffleArray(a) { return a.sort(function() { return Math.random() - 0.5; }); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

(function() { renderLevels(); })();
</script>
