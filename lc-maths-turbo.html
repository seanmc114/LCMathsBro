// ============================================================
// GAME ENGINE
// ============================================================
const UNCLE_UNLOCK = 5;
const PENALTY_SECS = 20;
const QUESTIONS_PER_ROUND = 10;

var currentCat = 'algebra';
var currentLevel = 1;
var currentItems = [];
var startTime, timerInterval;

const levelList = document.getElementById('level-list');
const gameContainer = document.getElementById('game');
const questionsContainer = document.getElementById('questions');
const resultsContainer = document.getElementById('results');

function storageKey(s) { return 'lcm_turbo_' + s; }
function getUnlocked() { return parseInt(localStorage.getItem(storageKey('unlocked')) || '1'); }
function setUnlocked(l) { if (l > getUnlocked()) localStorage.setItem(storageKey('unlocked'), l); }
function getBest(c, l) { return localStorage.getItem(storageKey('best_' + c + '_' + l)); }
function setBest(c, l, s) { var p = parseInt(getBest(c, l) || '0'); if (s > p) localStorage.setItem(storageKey('best_' + c + '_' + l), s); }

function getTotalStars() {
  var t = 0;
  ['algebra','geometry','statistics','functions','financial','coordinate','number'].forEach(function(c) {
    for (var v = 1; v <= 8; v++) t += parseInt(getBest(c, v) || '0');
  });
  return t;
}

function uncleUnlocked() { return getTotalStars() >= UNCLE_UNLOCK; }

function getTurboData() {
  var cats = ['algebra','geometry','statistics','functions','financial','coordinate','number'];
  var labels = { algebra:'Algebra', geometry:'Geometry & Trig', statistics:'Statistics', functions:'Functions', financial:'Financial Maths', coordinate:'Coordinate Geometry', number:'Number & Sets' };
  var data = {};
  cats.forEach(function(c) {
    data[c] = { label: labels[c], levels: {} };
    for (var l = 1; l <= 8; l++) { var s = getBest(c, l); if (s) data[c].levels[l] = parseInt(s); }
  });
  return data;
}

function selectCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderLevels();
}

function renderLevels() {
  levelList.style.display = 'flex';
  gameContainer.style.display = 'none';
  levelList.innerHTML = '';
  updateProgress();

  var unlocked = getUnlocked();
  var zones = { 1:'Levels 1‚Äì3 ¬∑ Core Knowledge', 4:'Levels 4‚Äì5 ¬∑ Application', 6:'Levels 6‚Äì8 ¬∑ Exam Standard' };

  for (var i = 1; i <= 8; i++) {
    if (zones[i]) {
      var zl = document.createElement('div');
      zl.className = 'zone-label';
      zl.textContent = zones[i];
      levelList.appendChild(zl);
    }
    var pool = getPool(currentCat, i);
    if (!pool.length) continue;

    var btn = document.createElement('button');
    var best = getBest(currentCat, i);
    var locked = i > unlocked;
    var stars = best ? '‚≠ê'.repeat(parseInt(best)) + '‚òÜ'.repeat(3 - parseInt(best)) : '';
    var isAdv = i >= 6;

    btn.className = 'level-btn' + (isAdv ? ' adv' : '');
    btn.type = 'button';
    btn.innerHTML = '<span>' + (locked ? 'üîí ' : '') + 'Level ' + i + ' <span style="font-size:0.72rem;opacity:0.6">(' + pool.length + ' items)</span></span>' +
      '<span class="level-badge">' + (stars || '‚Äî') + '</span>';
    btn.disabled = locked;
    (function(lv) { btn.addEventListener('click', function() { startGame(lv); }); })(i);
    levelList.appendChild(btn);
  }

  if (uncleUnlocked()) {
    var eb = document.createElement('button');
    eb.type = 'button';
    eb.textContent = 'üìê Meet The Uncle ‚Üí';
    eb.className = 'level-btn uncle-btn';
    eb.addEventListener('click', function() {
      localStorage.setItem('lcm_turbo_data', JSON.stringify(getTurboData()));
      window.location.href = 'lc-maths-uncle.html';
    });
    levelList.appendChild(eb);
  }
}

function getPool(cat, level) {
  return (TERMS[cat] || []).filter(function(p) { return p.lv === level; });
}

function getPlayPool(cat, level) {
  var exact = (TERMS[cat] || []).filter(function(p) { return p.lv === level; });
  var adjacent = (TERMS[cat] || []).filter(function(p) { return Math.abs(p.lv - level) === 1; });
  return shuffleArray(exact.slice()).concat(shuffleArray(adjacent.slice()));
}

function startGame(level) {
  currentLevel = level;
  var pool = getPlayPool(currentCat, level);
  currentItems = shuffleArray(pool.slice()).slice(0, QUESTIONS_PER_ROUND);

  levelList.style.display = 'none';
  gameContainer.style.display = 'block';
  questionsContainer.innerHTML = '';
  resultsContainer.innerHTML = '';

  currentItems.forEach(function(item) {
    var div = document.createElement('div');
    div.innerHTML = '<div><strong>' + escHtml(item.prompt) + '</strong></div>' +
      '<input type="text" data-answer="' + escHtml(item.answer) + '" placeholder="Your answer..." autocomplete="off" autocorrect="off" spellcheck="false">';
    var inp = div.querySelector('input');
    inp.addEventListener('paste', function(e) { e.preventDefault(); });
    questionsContainer.appendChild(div);
  });

  startTime = Date.now();
  timerInterval = setInterval(function() {
    document.getElementById('timer').textContent = 'Time: ' + Math.floor((Date.now() - startTime) / 1000) + 's';
  }, 1000);

  var first = questionsContainer.querySelector('input');
  if (first) first.focus();
}

document.getElementById('submit').addEventListener('click', function() {
  clearInterval(timerInterval);
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var penalty = 0;
  var total = currentItems.length;
  var lenientCorrect = 0;
  var strictCorrect = 0;

  var results = [];
  document.querySelectorAll('#questions input').forEach(function(input) {
    var userAns = input.value.trim();
    var correctAns = input.dataset.answer;
    var strict = normalise(userAns) === normalise(correctAns);
    var lenient = strict;
    if (!lenient) {
      var uWords = normalise(userAns).split(' ').filter(function(w) { return w.length > 1; });
      var cWords = normalise(correctAns).split(' ').filter(function(w) { return w.length > 1; });
      if (uWords.length && cWords.length) {
        var matches = uWords.filter(function(w) { return cWords.indexOf(w) !== -1; }).length;
        lenient = matches >= Math.ceil(Math.min(uWords.length, cWords.length) * 0.6);
      }
    }
    results.push({ userAns:userAns, correctAns:correctAns, strict:strict, lenient:lenient, prompt:input.closest('div').querySelector('strong').textContent });
    if (lenient) lenientCorrect++;
    if (strict) strictCorrect++;
  });

  document.querySelectorAll('#questions input').forEach(function(input, idx) {
    if (results[idx].lenient) { input.style.border='2px solid #16a34a'; input.style.background='#f0fdf4'; }
    else { penalty += PENALTY_SECS; input.style.border='2px solid #dc2626'; input.style.background='#fef2f2'; }
  });

  var totalTime = elapsed + penalty;
  var timeLimit = 180 - (currentLevel - 1) * 15;
  var stars = 0;
  if (strictCorrect === total && totalTime <= timeLimit) stars = 3;
  else if (lenientCorrect === total) stars = 2;
  else if (lenientCorrect >= Math.ceil(total * 0.5)) stars = 1;

  setBest(currentCat, currentLevel, stars);
  if (stars >= 1) setUnlocked(currentLevel + 1);

  resultsContainer.innerHTML = '';

  if (lenientCorrect === total) {
    var cel = document.createElement('div');
    cel.className = 'perfect-celebration';
    cel.textContent = stars === 3 ? 'üéâ PERFECT ‚Äî 3 stars!' : '‚úÖ All correct!';
    resultsContainer.appendChild(cel);
  }

  var sum = document.createElement('div');
  sum.innerHTML = '<h3>Done!</h3><p>Correct: ' + lenientCorrect + '/' + total + '</p>' +
    '<p>Time: ' + elapsed + 's + Penalty: ' + penalty + 's = <strong>' + totalTime + 's</strong></p>' +
    '<p style="font-size:1.4rem">' + '‚≠ê'.repeat(stars) + '‚òÜ'.repeat(3-stars) + '</p>';
  resultsContainer.appendChild(sum);

  var missed = results.filter(function(r) { return !r.lenient; });
  if (missed.length) {
    var mt = document.createElement('h4');
    mt.textContent = 'What you missed:';
    mt.style.marginTop = '10px';
    resultsContainer.appendChild(mt);
    missed.forEach(function(r) {
      var p = document.createElement('p');
      p.style.cssText = 'margin:6px 0;font-size:0.9rem;';
      p.innerHTML = '<strong>' + escHtml(r.prompt) + '</strong><br>‚úÖ <span style="color:#16a34a">' + escHtml(r.correctAns) + '</span><br>‚ùå <span style="color:#dc2626">' + escHtml(r.userAns || '(blank)') + '</span>';
      resultsContainer.appendChild(p);
    });
  }

  if (stars >= 1) {
    var um = document.createElement('p');
    um.className = 'unlock-msg';
    um.textContent = 'üîì Level ' + (currentLevel + 1) + ' unlocked!';
    resultsContainer.appendChild(um);
  }

  updateProgress();

  if (uncleUnlocked()) {
    var bm = document.createElement('p');
    bm.className = 'unlock-msg';
    bm.innerHTML = 'üìê The Uncle is ready! <a href="lc-maths-uncle.html" style="color:#1d4ed8;font-weight:bold;" onclick="saveTurboData()">Meet The Uncle ‚Üí</a>';
    resultsContainer.appendChild(bm);
  }

  var tb = document.createElement('button');
  tb.textContent = 'Try Again'; tb.className = 'try-again'; tb.type = 'button';
  tb.onclick = function() { startGame(currentLevel); };
  resultsContainer.appendChild(tb);

  var bb = document.createElement('button');
  bb.textContent = '‚Üê Back'; bb.id = 'back-button'; bb.type = 'button';
  bb.onclick = function() { renderLevels(); };
  resultsContainer.appendChild(bb);
});

function saveTurboData() { localStorage.setItem('lcm_turbo_data', JSON.stringify(getTurboData())); }

function updateProgress() {
  var stars = getTotalStars();
  var pct = Math.min(100, Math.round((stars / UNCLE_UNLOCK) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  var banner = document.getElementById('star-banner');
  if (uncleUnlocked()) {
    banner.textContent = 'üéâ ' + stars + ' stars ‚Äî The Uncle is unlocked!';
    banner.style.background = '#eff6ff'; banner.style.borderColor = '#1d4ed8'; banner.style.color = '#1d4ed8';
  } else {
    banner.textContent = '‚≠ê ' + stars + ' star' + (stars !== 1 ? 's' : '') + ' ‚Äî need ' + UNCLE_UNLOCK + ' to unlock The Uncle';
  }
}

function normalise(s) {
  return String(s).toLowerCase().replace(/['']/g,'').replace(/[,;:.!?]/g,'').replace(/\s+/g,' ').trim();
}
function shuffleArray(a) { return a.sort(function() { return Math.random() - 0.5; }); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

(function() { renderLevels(); })();
</script>
